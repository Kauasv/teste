<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doce Encanto Confeitaria</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        
        <div class="barra-gradiente"></div>

        <header class="topo">
            <img src="img/pngwing.com.png" class="logo" alt="Logo da confeitaria">
            <div class="loja-info">
                <h1>Doce Encanto Confeitaria</h1>
                
                <div class="info-linha">
                    <img src="https://api.iconify.design/mdi/map-marker.svg?color=%23d6336c" alt="Localização">
                    <p>Rua das Flores, 120, Jardim Doce, Betim - MG</p>
                </div>
                <div class="info-linha">
                    <img src="https://api.iconify.design/mdi/currency-usd.svg?color=%23d6336c" alt="Pedido mínimo">
                    <p>Pedido mínimo R$ 25,00</p>
                </div>
            </div>
        </header>

        <div class="status-loja">
            <span class="badge-aberto">Aberto</span>
            <div class="horarios-gatilho">
                <span>Ver horários</span>
                <img src="https://api.iconify.design/mdi/chevron-down.svg?color=%23d6336c" alt="Ver horários">
            </div>
        </div>

        <main>
            <section class="banner">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_x3dj2UVkmXq5gLz072pKa1pu01xYSVIcV3hvakCbiw&s=1024" class="banner-img" alt="Banner">
            </section>

            <section class="pesquisa">
                <div class="input-wrapper">
                    <img src="https://api.iconify.design/mdi/magnify.svg?color=%23d6336c" alt="Pesquisar">
                    <input type="text" id="busca" placeholder="Pesquisar...">
                </div>
            </section>

            <h2 class="secao-titulo">Categorias</h2>
            <section id="categorias" class="categorias"></section>
            
            <h2 class="secao-titulo">Destaques</h2>
            <section id="produtos" class="grid"></section>
        </main>

        <div class="menu-inferior-fixo">
            <div class="menu-aba ativo">
                <img src="https://api.iconify.design/mdi/format-list-bulleted.svg?color=%23d6336c" alt="Itens">
                <span>Itens</span>
            </div>
            <div class="menu-aba" onclick="document.getElementById('busca').focus()">
                <img src="https://api.iconify.design/mdi/magnify.svg?color=%23b98a9a" alt="Buscar">
                <span>Buscar</span>
            </div>
            <div class="menu-aba" onclick="abrirCheckout()">
                <div class="wrapper-icone-carrinho">
                    <img src="https://api.iconify.design/mdi/clipboard-text-outline.svg?color=%23b98a9a" alt="Pedidos">
                    <span id="contador-carrinho" class="badge-contador">0</span>
                </div>
                <span>Pedidos</span>
            </div>
        </div>

    </div> <button id="btn-carrinho-flutuante" onclick="abrirCheckout()">
        🛒 Ver Carrinho
    </button>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="fechar" onclick="fecharModal()">&times;</span>
            <div class="wrapper-imagem-modal">
                <img id="modalImagem" class="modal-imagem" alt="Produto">
            </div>
            <h2 id="modalNome"></h2>
            <p id="modalDescricao"></p>
            <hr>
            <h3>Adicionais</h3>
            <div id="listaAcrescimos" class="lista-adicionais"></div>
            <hr>
            <div class="modal-footer-unificado">
                <div class="quantidade-container">
                    <button type="button" class="btn-qtd" onclick="diminuirQtd()">-</button>
                    <span id="qtd">1</span>
                    <button type="button" class="btn-qtd" onclick="aumentarQtd()">+</button>
                </div>
                <button class="btn-adicionar-carrinho" onclick="adicionarCarrinho()">
                    <span>Adicionar ao Carrinho</span>
                    <strong id="totalProduto">R$ 0,00</strong>
                </button>
            </div>
        </div>
    </div>

    <div id="modalCheckout" class="modal">
        <div class="modal-content checkout-content">
            <span class="fechar" onclick="fecharCheckout()">&times;</span>
            <h2>Seu Carrinho</h2>
            
            <div id="itens-carrinho-lista"></div>
            
            <div class="total-checkout-box">
                <span>Total dos Produtos:</span>
                <strong id="total-geral-checkout">R$ 0,00</strong>
            </div>

            <hr>

            <h2>Forma de Envio</h2>
            <div class="opcao-envio">
                <label><input type="radio" name="tipoEnvio" value="entrega" checked onchange="alternarFormulario()"> 🛵 Entrega</label>
                <label><input type="radio" name="tipoEnvio" value="retirada" onchange="alternarFormulario()"> 🛍️ Retirar no Local</label>
            </div>

            <form id="form-pedido" onsubmit="event.preventDefault(); finalizarPedido();">
                <div class="campo-grupo">
                    <label>Nome Completo:</label>
                    <input type="text" id="cliente-nome" required placeholder="Digite seu nome">
                </div>
                
                <div class="campo-grupo">
                    <label>Telefone de Contato:</label>
                    <input type="tel" id="cliente-telefone" required placeholder="(00) 00000-0000">
                </div>

                <div id="campos-entrega">
                    <div class="campo-grupo">
                        <label>CEP:</label>
                        <input type="text" id="cliente-cep" placeholder="00000-000">
                    </div>
                    <div class="campo-grupo">
                        <label>Endereço Completo (Rua, Número, Bairro):</label>
                        <input type="text" id="cliente-endereco" placeholder="Ex: Rua das Flores, 123 - Bairro Centro">
                    </div>
                </div>

                <div class="campo-grupo">
                    <label>Forma de Pagamento:</label>
                    <select id="cliente-pagamento" required>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão">Cartão de Crédito/Débito</option>
                        <option value="Pix">Pix</option>
                    </select>
                </div>

                <button type="submit" class="btn-finalizar-pedido">Enviar Pedido para o WhatsApp 🚀</button>
            </form>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
